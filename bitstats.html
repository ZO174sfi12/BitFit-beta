<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BITSTATS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap');
:root {
  --bg:#08080f; --panel:#0d0d18; --border:#1c1c30;
  --accent:#7b5cff; --cyan:#00e5ff; --green:#00ffb3;
  --red:#ff3d6b; --yellow:#ffd600; --text:#c0c0d8; --muted:#8888aa;
  --glow-a:0 0 12px #7b5cff88,0 0 30px #7b5cff33;
  --glow-c:0 0 12px #00e5ff88,0 0 30px #00e5ff33;
  --glow-g:0 0 12px #00ffb388,0 0 30px #00ffb333;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Oxanium',sans-serif;font-size:14px;overflow-x:hidden;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 40% at 10% 10%,#7b5cff0a 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 90% 90%,#00e5ff08 0%,transparent 60%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(123,92,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(123,92,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
@keyframes pulse-line{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes popup-in{from{opacity:0;transform:translateY(6px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes neon-a{0%,100%{text-shadow:var(--glow-a)}50%{text-shadow:0 0 4px #7b5cffcc,0 0 30px #7b5cff99}}
header{position:relative;padding:14px 18px 12px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a0a16 0%,transparent 100%);z-index:10;}
header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--cyan),transparent);animation:pulse-line 4s ease-in-out infinite;}
.header-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.logo{font-family:'Oxanium',sans-serif;font-size:clamp(18px,5.5vw,26px);font-weight:800;letter-spacing:4px;animation:neon-a 5s ease-in-out infinite;display:flex;align-items:baseline;gap:0;align-items:center;}
.logo-link-wrap{font-size:clamp(11px,3.5vw,15px);opacity:.6;display:flex;align-items:baseline;gap:0;transition:opacity .2s;}
.logo-link-wrap:hover{opacity:.9;}
.logo-bit{color:var(--accent)}.logo-fit{color:var(--cyan)}.logo-beta{color:var(--muted);font-size:.55em;letter-spacing:2px;}
.logo-sep{color:var(--border);font-size:.6em;letter-spacing:0;margin:0 8px;align-self:center;}
.logo-supp-link{text-decoration:none;font-family:'Oxanium',sans-serif;font-weight:800;letter-spacing:4px;animation:neon-a 5s ease-in-out infinite 2.5s;}
.logo-supp-mini{color:var(--green);}
.header-right{display:flex;gap:18px;align-items:center;flex-wrap:wrap;}
.meta-item{display:flex;flex-direction:column;align-items:flex-end;}
.meta-label{font-family:monospace;font-size:10px;letter-spacing:2px;color:var(--muted);}
.meta-value{font-family:monospace;font-size:11px;font-weight:700;}
.tabs{display:flex;padding:10px 18px 0;gap:5px;overflow-x:auto;scrollbar-width:none;position:relative;z-index:10;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:6px 14px;font-family:monospace;font-size:10px;letter-spacing:1.5px;cursor:pointer;border:1px solid var(--muted);background:transparent;color:var(--muted);clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);transition:all .2s;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent;user-select:none;}
.tab:hover{color:var(--cyan);border-color:var(--cyan);}
.tab.active{color:var(--accent);border-color:var(--accent);background:#7b5cff11;box-shadow:0 0 12px #7b5cff22;}
#period-badge{font-family:monospace;font-size:9px;color:var(--muted);padding:4px 0 10px 18px;position:relative;z-index:10;}
#period-badge span{color:var(--cyan);}
.main{padding:0 12px 24px;display:flex;flex-direction:column;gap:12px;position:relative;z-index:1;}
.panel{background:var(--panel);border:1px solid var(--border);padding:14px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent 60%);box-shadow:0 0 8px var(--accent);}
.panel.c::before{background:linear-gradient(90deg,var(--cyan),transparent 60%);box-shadow:0 0 8px var(--cyan);}
.panel.g::before{background:linear-gradient(90deg,var(--green),transparent 60%);box-shadow:0 0 8px var(--green);}
.panel.y::before{background:linear-gradient(90deg,var(--yellow),transparent 60%);box-shadow:0 0 8px var(--yellow);}
.panel.r::before{background:linear-gradient(90deg,var(--red),transparent 60%);box-shadow:0 0 8px var(--red);}
.panel-title{font-family:monospace;font-size:9px;letter-spacing:2.5px;color:var(--accent);margin-bottom:12px;text-transform:uppercase;}
.panel.c .panel-title{color:var(--cyan);}.panel.g .panel-title{color:var(--green);}
.panel.y .panel-title{color:var(--yellow);}.panel.r .panel-title{color:var(--red);}
.lift-toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.lift-mode-btn{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;padding:4px 12px;border:1px solid var(--accent);background:transparent;color:var(--muted);cursor:pointer;clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);transition:all .2s;-webkit-tap-highlight-color:transparent;}
.lift-mode-btn.active{color:var(--accent);background:#7b5cff15;box-shadow:0 0 8px #7b5cff22;}
.lift-filters{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.lift-btn{font-family:monospace;font-size:9px;letter-spacing:1px;padding:3px 9px;border:1px solid;background:transparent;cursor:pointer;clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);transition:all .15s;opacity:.35;-webkit-tap-highlight-color:transparent;user-select:none;}
.lift-btn.active{opacity:1;}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.stat-card{background:#0a0a15;border:1px solid var(--border);padding:10px 12px;}
.stat-label{font-family:monospace;font-size:10px;letter-spacing:1px;color:var(--muted);margin-bottom:4px;}
.stat-value{font-size:clamp(18px,5vw,24px);font-weight:700;line-height:1;color:var(--accent);text-shadow:var(--glow-a);}
.stat-value.c{color:var(--cyan);text-shadow:var(--glow-c);}
.stat-value.g{color:var(--green);text-shadow:var(--glow-g);}
.stat-value.r{color:var(--red);}
.stat-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.pr-section-label{font-family:monospace;font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:6px;}
.pr-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;}
.pr-row:last-child{border-bottom:none;}
.pr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.pr-lift{flex:1;}.pr-vals{font-family:monospace;font-size:10px;color:var(--muted);}
.pr-gain{color:var(--green);font-family:monospace;font-size:11px;margin-left:4px;}
.analysis-blocks{display:flex;flex-direction:column;gap:14px;}
.analysis-block{}
.analysis-title{font-family:monospace;font-size:10px;letter-spacing:2px;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.analysis-title.a{color:var(--accent);}.analysis-title.c{color:var(--cyan);}
.analysis-title.g{color:var(--green);}.analysis-title.y{color:var(--yellow);}.analysis-title.r{color:var(--red);}
.analysis-text{font-size:13px;color:var(--text);line-height:1.65;}
.analysis-text b{color:var(--yellow);}.analysis-text em{color:var(--cyan);font-style:normal;}
.new-ex-list{}.new-ex-item{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;}
.new-ex-item:last-child{border-bottom:none;}
.new-ex-date{font-family:monospace;font-size:9px;color:var(--muted);white-space:nowrap;margin-left:8px;}
.cd{position:absolute;width:10px;height:10px;border-color:var(--accent);border-style:solid;opacity:.3;}
.cd.tl{top:4px;left:4px;border-width:1px 0 0 1px;}.cd.tr{top:4px;right:4px;border-width:1px 1px 0 0;}
.cd.bl{bottom:4px;left:4px;border-width:0 0 1px 1px;}.cd.br{bottom:4px;right:4px;border-width:0 1px 1px 0;}
.phase-popup{position:fixed;z-index:10000;background:#090912;border:1px solid var(--border);padding:12px 14px;max-width:260px;font-size:12px;line-height:1.6;color:var(--text);box-shadow:0 0 30px rgba(0,0,0,.9);animation:popup-in .15s ease;pointer-events:none;}
.phase-popup-title{font-family:monospace;font-size:10px;letter-spacing:2px;margin-bottom:7px;}
#phase-timeline{margin-top:8px;}
.phase-track{position:relative;height:17px;margin-bottom:2px;}
.phase-block{position:absolute;top:0;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;overflow:hidden;white-space:nowrap;border-top:1px solid;}
.phase-block.clickable{cursor:pointer;transition:filter .15s;}.phase-block.clickable:hover{filter:brightness(1.6);}
.phase-block.phase-selected{border-top-width:2px!important;filter:brightness(1.5);outline:1px solid rgba(255,255,255,.15);}
.radar-wrap{width:100%;display:flex;align-items:center;justify-content:center;padding:4px 0;}
/* ── Lift Selector ── */
.lift-selector{margin-bottom:10px;}
.lift-group{display:grid;gap:3px;margin-bottom:3px;}
.lift-group-p{grid-template-columns:repeat(4,1fr);}
.lift-group-s{grid-template-columns:repeat(5,1fr);}
.lift-group-label{font-family:monospace;font-size:9px;letter-spacing:2px;color:var(--muted);margin-bottom:3px;padding:4px 10px;display:block;user-select:none;cursor:pointer;}
.lift-group-label.group-active{color:var(--cyan);}
.lift-tile{background:#0a0a15;border:1px solid var(--border);padding:5px 2px;text-align:center;user-select:none;}
.lift-tile.active{border-color:var(--tc,var(--cyan));background:color-mix(in srgb, var(--tc,var(--cyan)) 8%, transparent);}
.lift-tile-name{font-family:monospace;font-size:10px;letter-spacing:.5px;color:var(--text);text-transform:uppercase;line-height:1.2;}
.lift-tile.active .lift-tile-name{color:var(--tc,var(--cyan));}
.lift-tile-weight{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--text);margin-top:2px;line-height:1;}
.lift-tile.active .lift-tile-weight{color:var(--tc,var(--cyan));}
.lift-mode-btn.wt-active{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.06);}
@media(min-width:768px){
  header{padding:16px 24px 14px;}
  .tabs{padding:14px 24px 0;}
  #period-badge{padding:4px 0 12px 24px;}
  .main{padding:0 24px 28px;display:grid;grid-template-columns:1fr 300px;gap:14px;}
  .lift-panel{grid-row:1;}.right-col{grid-row:1;display:flex;flex-direction:column;gap:12px;}
  .analysis-panel{grid-column:1 / -1;}
  .analysis-blocks{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
  .panel{padding:16px 18px;}
}


.fb-ok{color:var(--green);}
.fb-warn{color:var(--yellow);}
.fb-crit{color:var(--red);}
.fb-info{color:var(--cyan);}


.fb-ok{color:var(--green);}
.fb-warn{color:var(--yellow);}
.fb-crit{color:var(--red);}
.fb-info{color:var(--cyan);}


/* ── GZCLP ─────────────────────────────────────── */
.gzclp-wrap{padding:0 14px 32px;}
.gzclp-divider{border:none;border-top:1px solid var(--border);margin:20px 0 16px;}
.gzclp-topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.gzclp-title{font-family:monospace;font-size:11px;letter-spacing:3px;color:var(--accent);}
.gzclp-sub{font-family:monospace;font-size:11px;letter-spacing:1px;color:var(--cyan);margin-top:4px;}
.gzclp-day-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
.gzclp-day-btn{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1.5px;padding:5px 12px;border:1px solid var(--border);background:transparent;color:var(--text);opacity:.5;cursor:pointer;clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);transition:all .2s;-webkit-tap-highlight-color:transparent;}
.gzclp-day-btn.active{font-size:12px;padding:6px 16px;opacity:1;}
.gzclp-day-btn.next-day{border-style:dashed;opacity:.8;}
.next-indicator{color:var(--accent);font-weight:700;}
.gzclp-tiers{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;}
@media(max-width:600px){.gzclp-tiers{grid-template-columns:1fr;}}
.gzclp-tier{border:1px solid var(--border);background:#0a0a15;position:relative;overflow:hidden;padding:12px 13px 11px;}
.gzclp-tier::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.gzclp-tier.t1::before{background:linear-gradient(90deg,var(--accent),transparent 60%);box-shadow:0 0 6px var(--accent);}
.gzclp-tier.t2::before{background:linear-gradient(90deg,var(--cyan),transparent 60%);}
.gzclp-tier.t3::before{background:linear-gradient(90deg,var(--green),transparent 60%);}
.gzclp-badge{font-family:monospace;font-size:11px;letter-spacing:2px;padding:2px 8px;border:1px solid;clip-path:polygon(3px 0%,100% 0%,calc(100% - 3px) 100%,0% 100%);display:inline-block;margin-bottom:7px;}
.t1 .gzclp-badge{color:var(--accent);border-color:var(--accent);background:#7b5cff11;}
.t2 .gzclp-badge{color:var(--cyan);border-color:var(--cyan);background:#00e5ff11;}
.t3 .gzclp-badge{color:var(--green);border-color:var(--green);background:#00ffb311;}
.gzclp-exname{font-family:'Oxanium',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;color:var(--text);margin-bottom:4px;line-height:1.3;}
.gzclp-scheme{font-family:'Space Mono',monospace;font-size:11px;color:var(--text);margin-bottom:5px;}
.gzclp-wt{font-family:monospace;font-size:11px;margin-bottom:2px;}
.gzclp-prog{font-family:monospace;font-size:11px;color:var(--text);margin-top:5px;line-height:1.5;}
.gzclp-tier-note{font-family:monospace;font-size:11px;color:var(--yellow);margin-top:5px;padding:3px 7px;background:#ffd60009;border-left:2px solid var(--yellow);}
.gzclp-fb-wrap{border:1px solid var(--border);background:#0a0a15;overflow:hidden;}
.gzclp-fb-head{font-family:monospace;font-size:11px;letter-spacing:2px;color:var(--accent);padding:6px 12px;border-bottom:1px solid var(--border);background:#0d0d18;display:flex;justify-content:space-between;align-items:center;}
.gzclp-fb-row{padding:4px 12px;border-bottom:1px solid #0f0f1a;font-family:monospace;font-size:11px;line-height:1.4;display:flex;gap:8px;align-items:flex-start;}
.gzclp-fb-row:last-child{border-bottom:none;}
.fb-ok{color:var(--green);}
.fb-warn{color:var(--yellow);}
.fb-crit{color:var(--red);}
.fb-info{color:var(--cyan);}
.gzclp-period{font-family:monospace;font-size:11px;color:var(--text);padding:4px 12px;background:#080810;border-top:1px solid var(--border);}
.gzclp-t3-full{grid-column:1/-1;border:1px solid var(--border);background:#0a0a15;position:relative;overflow:hidden;padding:12px 13px 11px;}
.gzclp-t3-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
@media(max-width:500px){.gzclp-t3-grid{grid-template-columns:1fr;}}
.gzclp-t3-item{padding:7px 10px;border:1px solid var(--border);background:#0d0d18;}
.gzclp-rest-line{font-family:monospace;font-size:11px;margin-top:7px;padding-top:6px;border-top:1px solid #1a1a2e;}
.gzclp-wu-inline{margin-top:9px;padding-top:8px;border-top:1px solid #1a1a2e;}
.gzclp-wu-inline-title{font-family:monospace;font-size:11px;letter-spacing:1px;color:var(--cyan);margin-bottom:4px;}
.gzclp-wu-inline-row{display:flex;gap:10px;font-family:monospace;font-size:11px;padding:2px 0;align-items:baseline;}
.gzclp-wu-inline-work{font-weight:700;padding-top:4px;margin-top:2px;border-top:1px solid #1a1a2e;}
.gzclp-wu-rest{font-family:monospace;font-size:10px;color:var(--text);padding:1px 0 1px 4px;letter-spacing:.5px;}
.gzclp-wu-rest-work{color:var(--accent);font-size:10px;padding-bottom:3px;}
/* Tier body flex layout */
.gzclp-tier-body{display:flex;gap:12px;flex-direction:column;}
@media(min-width:600px){.gzclp-tier-body{flex-direction:row;align-items:flex-start;}}
.gzclp-tier-main{flex:1;min-width:0;}
.gzclp-wu-details{flex:0 0 auto;min-width:140px;max-width:180px;}
@media(max-width:599px){.gzclp-wu-details{max-width:100%;}}
.gzclp-wu-summary{font-family:monospace;font-size:9px;letter-spacing:1px;cursor:pointer;list-style:none;padding:4px 0;text-transform:uppercase;}
.gzclp-wu-summary::-webkit-details-marker{display:none;}
/* Lift tile sets */
.lift-tile-sets{font-family:monospace;font-size:9px;color:var(--text);margin-top:1px;line-height:1;}
.lift-group-maxw{font-family:monospace;font-size:9px;color:var(--muted);letter-spacing:0;text-align:right;}
/* Analysis panel collapsible */
#analysis-details summary::-webkit-details-marker{display:none;}
#analysis-details summary{list-style:none;}
.gzclp-details{margin-top:8px;border:1px solid var(--border);background:#0a0a15;overflow:hidden;}
.gzclp-coll-head{font-family:monospace;font-size:11px;letter-spacing:2px;padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;list-style:none;user-select:none;background:#0d0d18;}
.gzclp-coll-head::-webkit-details-marker{display:none;}
.gzclp-details[open] .gzclp-coll-head{border-bottom:1px solid var(--border);}
.gzclp-details-body{padding:10px 13px;}
.gzclp-wu-title{font-family:monospace;font-size:11px;letter-spacing:1px;margin-bottom:5px;}
.gzclp-wu-row{display:flex;gap:10px;font-family:monospace;font-size:11px;padding:3px 0;border-bottom:1px solid #0f0f1a;align-items:baseline;}
.gzclp-wu-work{border-top:1px solid #1a1a2e;margin-top:2px;padding-top:4px;border-bottom:none;}
.gzclp-stretch-item{font-family:monospace;font-size:11px;padding:4px 0;border-bottom:1px solid #0f0f1a;color:var(--text);line-height:1.45;}
.gzclp-rules{margin-top:0;border:1px solid var(--border);background:#0a0a15;overflow:hidden;}
.gzclp-rules-head{font-family:monospace;font-size:11px;letter-spacing:2px;color:var(--accent);padding:10px 12px;cursor:pointer;list-style:none;user-select:none;background:#0d0d18;display:flex;justify-content:space-between;align-items:center;}
.gzclp-rules-head::-webkit-details-marker{display:none;}
.gzclp-rules[open] .gzclp-rules-head{border-bottom:1px solid var(--border);}
.gzclp-rules-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
@media(max-width:600px){.gzclp-rules-grid{grid-template-columns:1fr;}}
.gzclp-rule{padding:9px 13px;border-bottom:1px solid #0f0f1a;border-right:1px solid #0f0f1a;}
.gzclp-rule:nth-child(even){border-right:none;}
.gzclp-rule-title{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;margin-bottom:3px;}
.gzclp-rule-body{font-family:monospace;font-size:11px;color:var(--text);line-height:1.55;}

/* ── COMMENT SECTION ──────────────────────────────────────────────── */
#comment-section{max-width:680px;margin:32px auto 0;padding:0 12px 40px;}
#comment-section-head{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;
  color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
#comment-section-head::before,#comment-section-head::after{content:'';flex:1;height:1px;background:#1a1a2e;}
/* Coach Yani requests */
#coach-feed{margin-bottom:20px;}
.coach-request{background:#120b06;border:1px solid #ff6b3530;border-left:3px solid #ff6b35;
  border-radius:4px;padding:10px 14px;margin-bottom:8px;line-height:1.6;}
.coach-request-meta{font-family:'Space Mono',monospace;font-size:9px;color:#ff6b3570;
  margin-bottom:4px;display:flex;gap:10px;}
.coach-request-label{color:#ff6b35;font-weight:700;}
.coach-request-text{font-size:13px;color:var(--text);white-space:pre-wrap;}
.coach-empty{font-family:'Space Mono',monospace;font-size:10px;color:#1e1e3a;
  text-align:center;padding:12px 0;}
/* Input box */
#comment-input-wrap{display:flex;flex-direction:column;gap:8px;}
#comment-input{width:100%;min-height:72px;background:#0d0d1a;border:1px solid #1a1a2e;
  border-radius:4px;color:var(--text);font-family:monospace;font-size:13px;
  padding:10px 12px;resize:vertical;box-sizing:border-box;outline:none;}
#comment-input:focus{border-color:#2a2a4a;}
#comment-submit{align-self:flex-end;font-family:'Space Mono',monospace;font-size:10px;
  letter-spacing:1px;padding:7px 16px;border:1px solid #1a1a2e;border-radius:3px;
  cursor:pointer;background:none;color:var(--muted);}
#comment-submit:hover{color:var(--text);border-color:#2a2a4a;}
#comment-feedback{font-family:'Space Mono',monospace;font-size:9px;color:var(--accent);
  min-height:14px;text-align:right;}

/* ── Page nav ──────────────────────────────────────────────────────── */
.page-nav{display:flex;justify-content:center;gap:8px;padding:10px 18px;background:#090910;border-bottom:1px solid var(--border);position:relative;z-index:10;flex-wrap:wrap;}
.page-nav::-webkit-scrollbar{display:none;}
.nav-item{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;padding:7px 20px;color:var(--muted);text-decoration:none;border:1px solid var(--border);background:transparent;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);transition:all .2s;white-space:nowrap;}
.nav-item:hover{color:var(--text);border-color:var(--muted);}
.nav-item.nav-active{color:var(--accent);border-color:var(--accent);background:#7b5cff18;box-shadow:0 0 10px #7b5cff22;}
.nav-item.nav-stats-active{color:var(--cyan);border-color:var(--cyan);background:#00e5ff18;box-shadow:0 0 10px #00e5ff22;}
.nav-item.nav-supp-active{color:var(--green);border-color:var(--green);background:#00ffb318;box-shadow:0 0 10px #00ffb322;}
@media(max-width:480px){.nav-item{padding:6px 14px;letter-spacing:1px;font-size:10px;}.page-nav{gap:5px;padding:8px 10px;}}

  'DB Bench x2':'DB BENCH','Lat PD':'LAT PD','DIP-BW':'DIP',
  'Front Squat':'FRONT SQ.','Row':'ROW'
};
let activeGroup = 'primary';
let activeLiftFilter = new Set(PRIMARY_LIFTS);
let radarStart = null;

function getPeriodSets(key, start) {
  const lift = DATA.lifts[key];
  if (!lift || !lift.points.length) return null;
  const startStr = (start instanceof Date) ? start.toISOString().slice(0,10) : '';
  const pts = startStr ? lift.points.filter(p => p.date >= startStr) : lift.points;
  if (!pts.length) return null;
  const total = pts.reduce((acc, p) => acc + (p.sets || 0), 0);
  return total || null;
}

function getTopWeightYear(key) {
  const lift = DATA.lifts[key];
  if (!lift || !lift.points.length) return null;
  const ya = new Date(TODAY); ya.setFullYear(ya.getFullYear() - 1);
  const yaStr = ya.toISOString().slice(0,10);
  const pts = lift.points.filter(p => p.date >= yaStr && p.weight > 0);
  if (!pts.length) return null;
  return Math.max(...pts.map(p => p.weight));
}

function renderLiftSelector() {
  [['primary-tiles', PRIMARY_LIFTS, 'lbl-primary', 'primary'], ['secondary-tiles', SECONDARY_LIFTS, 'lbl-secondary', 'secondary']].forEach(([id, keys, lblId, grp]) => {
    const el = document.getElementById(id); if (!el) return;
    const lbl = document.getElementById(lblId);
    const isActive = grp === activeGroup;
    el.style.display = isActive ? '' : 'none';
    if (lbl) lbl.classList.toggle('group-active', isActive);
    if (!isActive) return;
    el.innerHTML = keys.map(key => {
      const lift = DATA.lifts[key];
      const color = lift ? lift.color : '#454560';
      const w = getTopWeightYear(key);
      const wLabel = w != null ? w + ' kg' : '—';
      const sets = getPeriodSets(key, radarStart);
      const active = activeLiftFilter.has(key);
      return `<div class="lift-tile${active?' active':''}" style="--tc:${color};cursor:pointer" onclick="toggleLiftTile('${key}')">`+
        `<div class="lift-tile-name">${LIFT_LABELS[key]||key}</div>`+
        `<div class="lift-tile-weight">${wLabel}</div>`+
        `<div class="lift-tile-sets">${sets != null ? sets + ' sets' : ''}</div></div>`;
    }).join('');
  });
}

function switchLiftGroup(grp) {
  activeGroup = grp;
  activeLiftFilter = new Set(grp === 'primary' ? PRIMARY_LIFTS : SECONDARY_LIFTS);
  if (radarStart) update(radarStart);
}

function toggleLiftTile(key) {
  if (activeLiftFilter.has(key)) {
    if (activeLiftFilter.size > 1) activeLiftFilter.delete(key);
  } else {
    activeLiftFilter.add(key);
  }
  if (radarStart) update(radarStart);
}

function selectLiftGroup(group) {
  activeLiftFilter = new Set(group === 'primary' ? PRIMARY_LIFTS : SECONDARY_LIFTS);
  if (radarStart) update(radarStart);
}

let liftChart = null;
let liftMode = '1rm'; // 'werk' or '1rm'
const epleyFactor = 1.1;

function setLiftMode(mode) {
  liftMode = mode;
  document.getElementById('btn-werk').classList.toggle('active', mode === 'werk');
  document.getElementById('btn-1rm').classList.toggle('active', mode === '1rm');
  document.getElementById('panel-lift-title').textContent = mode === 'werk' ? 'WERKGEWICHT' : 'GESCHATTE 1RM (~x1.1)';
  // Re-update using active period or custom start
  update(getActiveStart());
}
let showWeight = true;
let _customStart = null; // Date | null — ingesteld via fase-klik
let _customEnd   = null;
function getActiveEnd() { return _customEnd || TODAY; }
let radarChart = null;

function fmt(d) { return d.toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'}); }
function getPeriodStart(days) {
  if (days === 0) return new Date(PHASES[0].start);
  const d = new Date(TODAY); d.setDate(d.getDate() - days); return d;
}
function getActiveStart() {
  if (_customStart) return _customStart;
  const tab = document.querySelector('.tab.active');
  return tab ? getPeriodStart(parseInt(tab.dataset.period)) : getPeriodStart(30);
}

function toggleWeight() {
  showWeight = !showWeight;
  document.getElementById('btn-weight').classList.toggle('wt-active', showWeight);
  update(getActiveStart());
}

// ── Fase tijdlijn ──
function renderTimeline(start) {
  const el = document.getElementById('phase-timeline');
  if (!el) return;
  const s = start.toISOString().slice(0,10);
  const t = TODAY.toISOString().slice(0,10);
  const totalMs = new Date(t) - new Date(s);
  if (totalMs <= 0) { el.innerHTML = ''; return; }
  const selectedStart = _customStart ? _customStart.toISOString().slice(0,10) : null;
  const tracks = [[], [], []];
  PHASES.forEach(p => {
    if (p.end < s || p.start > t) return;
    (tracks[p.track || 0] || tracks[0]).push(p);
  });
  el.innerHTML = tracks.map((phases, ti) => {
    if (!phases.length) return '';
    const blocks = phases.map(p => {
      const pS = new Date(Math.max(new Date(p.start), new Date(s)));
      const pE = new Date(Math.min(new Date(p.end), new Date(t)));
      const left = (pS - new Date(s)) / totalMs * 100;
      const width = (pE - pS) / totalMs * 100;
      if (width < 0.3) return '';
      const isSelected = selectedStart && p.start === selectedStart;
      const clickable = true;
      const lbl = width > 12 ? (width > 22 ? p.label : p.short) : '';
      return `<div class="phase-block${clickable?' clickable':''}${isSelected?' phase-selected':''}"
        style="left:${left.toFixed(2)}%;width:${width.toFixed(2)}%;background:${p.color}18;border-color:${p.color}88;color:${p.color};"
        title="${p.label} (${p.start} → ${p.end})"
        ${clickable ? `onclick="selectPhase('${p.start}','${p.end}')"` : ''}
      >${lbl}</div>`;
    }).join('');
    return `<div class="phase-track">${blocks}</div>`;
  }).join('');
}

function selectPhase(startStr, endStr) {
  _customStart = new Date(startStr);
  const todayStr = TODAY.toISOString().slice(0,10);
  _customEnd = (endStr && endStr < todayStr) ? new Date(endStr) : null;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  update(_customStart);
}

// ── Sets per oefening ──
function renderRadar(start) {
  const s = start.toISOString().slice(0,10), t = getActiveEnd().toISOString().slice(0,10);
  // Sets per oefening: gebruik p.sets uit DATA (gezet door process_jefit.py)
  const exercises = Object.entries(DATA.lifts).filter(([key]) => activeLiftFilter.has(key)).map(([key, lift]) => {
    const pts = lift.points.filter(p => p.date >= s && p.date <= t);
    const sets = pts.reduce((acc, p) => acc + (p.sets || 0), 0);
    const vol = pts.reduce((acc, p) => acc + p.volume, 0);
    const rm1 = pts.length ? Math.max(...pts.map(p => p.est1rm || 0)) : 0;
    const gain = pts.length > 1 ? Math.round((pts[pts.length-1].weight - pts[0].weight) * 10) / 10 : 0;
    return {key, sets, vol, rm1, gain, color: lift.color};
  }).filter(e => e.sets > 0).sort((a, b) => b.sets - a.sets);
  if (radarChart) radarChart.destroy();
  if (!exercises.length) { radarChart = null; return; }
  const ctx = document.getElementById('radarChart').getContext('2d');
  const gainLabelPlugin = {
    id: 'gainLabels',
    afterDatasetsDraw(chart) {
      const ds = chart.data.datasets[0];
      if (!ds || !ds._gains) return;
      const cctx = chart.ctx;
      const meta = chart.getDatasetMeta(0);
      cctx.save();
      cctx.font = 'bold 9px monospace';
      cctx.textBaseline = 'middle';
      ds._gains.forEach((gain, i) => {
        if (!gain) return;
        const bar = meta.data[i];
        if (!bar) return;
        const label = gain > 0 ? `+${gain} kg` : `${gain} kg`;
        const textW = cctx.measureText(label).width;
        // Teken alleen als de balk breed genoeg is
        if (bar.x < textW + 10) return;
        cctx.fillStyle = gain > 0 ? '#00ffb3cc' : '#ff6b6bcc';
        cctx.textAlign = 'right';
        cctx.fillText(label, bar.x - 5, bar.y);
      });
      cctx.restore();
    }
  };
  radarChart = new Chart(ctx, {
    type: 'bar',
    plugins: [gainLabelPlugin],
    data: {
      labels: exercises.map(e => e.key),
      datasets: [{
        data: exercises.map(e => e.sets),
        backgroundColor: exercises.map(e => e.color + '44'),
        borderColor: exercises.map(e => e.color),
        borderWidth: 1,
        borderRadius: 2,
        _vols: exercises.map(e => e.vol),
        _rm1s: exercises.map(e => e.rm1),
        _gains: exercises.map(e => e.gain),
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: { grid: { color: '#1a1a2e' }, ticks: { color: '#454560', font: { size: 8 }, stepSize: 1 }, beginAtZero: true },
        y: { grid: { display: false }, ticks: { color: '#c0c0d8', font: { family: "'Space Mono',monospace", size: 8 } } }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          position: 'nearest', yAlign: 'bottom',
          backgroundColor: '#0a0a15', borderColor: '#1c1c30', borderWidth: 1, bodyColor: '#c0c0d8', titleColor: '#7b5cff',
          callbacks: {
            label: ctx => {
              const vol = ctx.dataset._vols[ctx.dataIndex];
              const rm1 = ctx.dataset._rm1s[ctx.dataIndex];
              const gain = ctx.dataset._gains[ctx.dataIndex];
              const rmStr = rm1 ? `  |  ~${rm1} kg 1RM` : '';
              const gainStr = gain > 0 ? `  |  +${gain} kg` : gain < 0 ? `  |  ${gain} kg` : '';
              return ` ${ctx.raw} sets  |  ${Math.round(vol/1000*10)/10}k kg vol${gainStr}${rmStr}`;
            }
          }
        }
      }
    }
  });
}

function buildLiftDatasets(start) {
  const end = getActiveEnd();
  const s = start.toISOString().slice(0,10), t = end.toISOString().slice(0,10);
  const allDatesSet = new Set();
  Object.values(DATA.lifts).forEach(lift => lift.points.filter(p => p.date >= s && p.date <= t).forEach(p => allDatesSet.add(p.date)));
  DATA.weight.filter(p => p.date >= s && p.date <= t).forEach(p => allDatesSet.add(p.date));
  // Altijd uitbreiden tot het laatste weegpunt — ook als dat na de laatste trainingssessie valt
  // (bv. na operatie: geen training meer maar wel dagelijks wegen)
  const allWSorted = DATA.weight.slice().sort((a,b) => a.date.localeCompare(b.date));
  const lastWDate = allWSorted.length ? allWSorted[allWSorted.length-1].date : null;
  if (lastWDate && lastWDate >= s && lastWDate <= t) allDatesSet.add(lastWDate);
  const allDates = Array.from(allDatesSet).sort();
  const datasets = Object.entries(DATA.lifts).filter(([key]) => activeLiftFilter.has(key)).map(([key, lift]) => {
    const byDate = {};
    lift.points.filter(p => p.date >= s && p.date <= t).forEach(p => byDate[p.date] = p);
    return {
      label: key, data: allDates.map(d => {
        if (!byDate[d]) return null;
        return liftMode === '1rm' ? (byDate[d].est1rm || Math.round(byDate[d].weight * epleyFactor * 10) / 10) : byDate[d].weight;
      }),
      borderColor: lift.color, backgroundColor: lift.color + '22',
      pointBackgroundColor: allDates.map(d => byDate[d] ? lift.color : 'transparent'),
      pointBorderColor: allDates.map(d => !byDate[d] ? 'transparent' : d===t ? '#ffffff' : byDate[d].pr ? '#ffffff88' : 'transparent'),
      pointBorderWidth: allDates.map(d => d===t&&byDate[d] ? 2 : 1),
      pointRadius: allDates.map(d => !byDate[d] ? 0 : d===t ? 6 : 3),
      pointHoverRadius: 7, borderWidth: 2, tension: 0.3, spanGaps: true, fill: false,
    };
  });
  if (showWeight) {
    const wByDate = {};
    DATA.weight.filter(p => p.date >= s && p.date <= t).forEach(p => wByDate[p.date] = p.weight);
    datasets.push({
      label: 'Gewicht', data: allDates.map(d => wByDate[d] ?? null),
      borderColor: 'rgba(255,255,255,0.35)', backgroundColor: 'transparent',
      pointBackgroundColor: 'rgba(255,255,255,0.35)', pointBorderColor: 'transparent',
      pointStyle: 'circle', pointRadius: allDates.map(d => wByDate[d]!==undefined ? 2 : 0),
      pointHoverRadius: 4, borderWidth: 1, tension: 0.5, spanGaps: true, fill: false, borderDash: [4,4],
    });
  }
  return {datasets, labels: allDates};
}

function computeStats(start) {
  const end = getActiveEnd();
  const s = start.toISOString().slice(0,10), t = end.toISOString().slice(0,10);
  const totalDays = Math.round((end - start) / 86400000) + 1;
  const _allDays = [...new Set([...(DATA.training_days||[]), ...(DATA.all_active_days||[])])];
  const td = _allDays.filter(d => d >= s && d <= t).length;
  // Activiteiten opsplitsing
  const acts = (DATA.activities || []).filter(a => a.date >= s && a.date <= t);
  const gymDays    = new Set(acts.filter(a => a.category === 'gym').map(a => a.date));
  const muayDays   = new Set(acts.filter(a => a.category === 'muay_thai').map(a => a.date));
  const otherDays  = new Set(acts.filter(a => a.category === 'other').map(a => a.date));
  // Gym dagen die niet in AH zitten maar wel in Jefit training_days
  _allDays.filter(d => d >= s && d <= t).forEach(d => gymDays.add(d));
  const gymN   = gymDays.size;
  const muayN  = muayDays.size;
  const otherN = otherDays.size;
  const totalAct = gymN + muayN + otherN;
  const wPts = DATA.weight.filter(p => p.date >= s && p.date <= t);
  const wFirst = wPts.length ? wPts[0].weight : null;
  const wLast  = wPts.length ? wPts[wPts.length-1].weight : null;
  // Delta: gemiddelde laatste 3 metingen in periode vs eerste 3 in periode
  function subtractDays(dateStr, n) { const d = new Date(dateStr); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); }
  function addDays(dateStr, n) { const d = new Date(dateStr); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
  const recentW = wPts.slice(-3).map(w => w.weight);
  const oldW    = wPts.slice(0, 3).map(w => w.weight);
  const recentAvg = recentW.length ? Math.round(recentW.reduce((a,b) => a+b,0) / recentW.length * 100) / 100 : null;
  const oldAvg    = oldW.length    ? Math.round(oldW.reduce((a,b) => a+b,0)    / oldW.length    * 100) / 100 : null;
  const wDelta = (recentAvg !== null && oldAvg !== null) ? Math.round((recentAvg - oldAvg) * 100) / 100 : null;
  const wDeltaLabel = wDelta !== null ? (wDelta >= 0 ? '+' : '') + wDelta + ' kg (' + wPts[0].date.slice(5) + '→' + wPts[wPts.length-1].date.slice(5) + ')' : null;
  // Vet/lean breakdown via Deurenberg (inlined)
  const _bfEst = kg => { const bmi = kg / (1.93*1.93); return Math.max(5, (1.2*bmi + 0.23*37 - 10.8 - 5.4)); };
  let fatDelta = null, leanDelta = null;
  if (oldAvg !== null && recentAvg !== null) {
    const fatOld  = oldAvg    * _bfEst(oldAvg)    / 100;
    const fatNew  = recentAvg * _bfEst(recentAvg) / 100;
    fatDelta  = Math.round((fatNew  - fatOld)              * 10) / 10;
    leanDelta = Math.round((wDelta  - fatDelta)            * 10) / 10;
  }

  const epley = w => Math.round(w * 1.1 * 10) / 10;
  const prs = {};
  Object.entries(DATA.lifts).filter(([key]) => !BACKGROUND_LIFTS.has(key)).forEach(([key, lift]) => {
    const all = lift.points.filter(p => p.date >= s && p.date <= t);
    const prPts = all.filter(p => p.pr);
    if (!prPts.length) return;
    const firstW = all[0]?.weight ?? prPts[0].weight;
    const maxW = Math.max(...prPts.map(p => p.weight));
    prs[key] = {weight: maxW, est1rm: epley(maxW), firstWeight: firstW, rm_gain: Math.round((epley(maxW)-epley(firstW))*10)/10, color: lift.color};
  });
  const top3 = Object.entries(prs).sort((a,b) => b[1].rm_gain - a[1].rm_gain).slice(0,3);
  return {td, totalDays, wFirst, wLast, wDelta, wDeltaLabel, fatDelta, leanDelta, top3, gymN, muayN, otherN, totalAct};
}

function renderStats(stats) {
  const $ = id => document.getElementById(id);
  $('s-gymdays').textContent = stats.totalAct || stats.td;
  $('s-totaldays').textContent = '/ ' + stats.totalDays + 'd';
  const splitEl = $('s-activity-split');
  if (splitEl) {
    const muayLine = stats.muayN > 0 ? `Muay Thai: ${stats.muayN}<br>` : `Muay Thai: —<br>`;
    splitEl.innerHTML =
      `Gym: ${stats.gymN}<br>` +
      muayLine +
      (stats.otherN > 0 ? `Other: ${stats.otherN}` : '');
  }
  if (stats.wDelta !== null) {
    $('s-wdelta').textContent = (stats.wDelta >= 0 ? '+' : '') + stats.wDelta + ' kg';
    $('s-wdelta').className = 'stat-value ' + (stats.wDelta <= 0 ? 'g' : 'r');
    $('s-wrange').textContent = stats.wDeltaLabel || (stats.wFirst + ' -> ' + stats.wLast + ' kg');
    const comp = $('s-wcomp');
    if (comp && stats.fatDelta !== null) {
      const sign = v => (v >= 0 ? '+' : '') + v;
      comp.innerHTML =
        `<span style="color:#ff8a65">${sign(stats.fatDelta)} kg vet</span>` +
        `<span style="color:var(--muted)"> · </span>` +
        `<span style="color:#80deea">${sign(stats.leanDelta)} kg lean</span>`;
    }
  }

}


const MC = {Benen:'#b388ff',Rug:'#ffd600',Borst:'#64b5f6',Schouders:'#00ffb3',Glutes:'#ce93d8',Triceps:'#f48fb1',Biceps:'#80cbc4',Core:'#ff8a65'};

function renderAnalysis(start) {
  const end = getActiveEnd();
  const s = start.toISOString().slice(0,10), t = end.toISOString().slice(0,10);
  const overlapping = PHASES.filter(p => (p.track || 0) === 0 && p.start <= t && p.end >= s);
  const track1Active = PHASES.filter(p => (p.track||0) === 1 && p.start <= t && p.end >= t);
  const recPhase = track1Active.find(p => p.label === 'RECOVERY');
  const ziektePhase = !recPhase && track1Active.find(p => p.label === 'ZIEKTE');
  const gzPhase = overlapping.find(p => p.label === 'GREYSKULL');

  // primary = telt mee in volume%; secondary = markeert spiergroep als aanwezig (nooit "afwezig")
  const LIFT_MUSCLE = {
    Squat:         { primary:'Benen',     secondary:'Glutes'  },
    Deadlift:      { primary:'Rug',       secondary:'Glutes'  },
    Bench:         { primary:'Borst'                          },
    OHP:           { primary:'Schouders'                      },
    'DB Bench x2': { primary:'Borst'                          },
    'Lat PD':      { primary:'Rug'                            },
    'DIP-BW':      { primary:'Borst',     secondary:'Triceps' },
    'Front Squat': { primary:'Benen',     secondary:'Glutes'  },
    'Hip Thrust':  { primary:'Glutes'                         },
  };

  // ── Muscle balance ──
  const muscleVol = {};
  const musclePresent = new Set();
  Object.entries(DATA.lifts).forEach(([key, lift]) => {
    const pts = lift.points.filter(p => p.date >= s && p.date <= t);
    const mapping = LIFT_MUSCLE[key];
    if (mapping && pts.length) {
      const setCount = pts.reduce((acc, p) => acc + (p.sets || 1), 0);
      muscleVol[mapping.primary] = (muscleVol[mapping.primary] || 0) + setCount;
      musclePresent.add(mapping.primary);
      if (mapping.secondary) musclePresent.add(mapping.secondary);
    }
  });
  const absentMuscles = Object.keys(MC).filter(m => !musclePresent.has(m));

  // ── Push / pull balans ──
  const LIFT_CAT = {
    Squat:'legs', Deadlift:'hinge', 'Front Squat':'legs', 'Hip Thrust':'glutes',
    Bench:'push-h', OHP:'push-v', 'DB Bench x2':'push-h', 'DIP-BW':'push-v',
    'Lat PD':'pull-v',
  };
  const catS = {};
  Object.entries(DATA.lifts).forEach(([key, lift]) => {
    const pts = lift.points.filter(p => p.date >= s && p.date <= t);
    if (pts.length && LIFT_CAT[key]) {
      const sc = pts.reduce((a,p) => a+(p.sets||1), 0);
      catS[LIFT_CAT[key]] = (catS[LIFT_CAT[key]]||0) + sc;
    }
  });
  const pushH = catS['push-h']||0, pushV = catS['push-v']||0;
  const pullV = catS['pull-v']||0;
  const pushTot = pushH + pushV;
  const ppRatio = pullV > 0 ? Math.round(pushTot/pullV*10)/10 : null;
  let focusHtml;
  if (!pushTot && !pullV) {
    focusHtml = '— geen data';
  } else if (!pullV) {
    focusHtml = `<b style="color:var(--red)">Alleen push — pull volledig afwezig.</b> Geen verticale of horizontale pull getrackt.`;
  } else {
    const ppClr = ppRatio > 2 ? 'var(--red)' : ppRatio > 1.4 ? 'var(--yellow)' : 'var(--green)';
    const ppLbl = ppRatio > 2 ? `Push domineert ${ppRatio}×` : ppRatio > 1.4 ? `Meer push dan pull (${ppRatio}×)` : `Push/pull in balans (${ppRatio}×)`;
    focusHtml = `<b style="color:${ppClr}">${ppLbl}</b> — ${pushTot} push vs ${pullV} pull sets.`;
    if (!pushV) focusHtml += ` Verticale push (OHP) afwezig.`;
    if (pushH && !pullV) focusHtml += ` Horizontale pull niet getrackt (Cable Row).`;
  }
  if (absentMuscles.length) focusHtml += ` <span style="color:var(--text)">Niet getrackt: ${absentMuscles.join(', ')}.</span>`;

  // ── GZCLP Adherence ──
  const _T1S = new Set(['Squat','Bench','Deadlift']);
  const _T2S = new Set(['OHP','Front Squat','Row','DB Bench x2']);
  const _t3Days = DATA.t3_days || {};
  const gzStart = gzPhase ? (gzPhase.start > s ? gzPhase.start : s) : s;
  const sessions = {};
  for (const [nm, lift] of Object.entries(DATA.lifts || {}))
    for (const pt of lift.points || [])
      if (pt.date >= gzStart && pt.date <= t)
        (sessions[pt.date] = sessions[pt.date] || []).push(nm);
  const dates = Object.keys(sessions).sort();
  let adherenceHtml = '—';
  if (dates.length && gzPhase) {
    let good = 0;
    const issues = [];
    dates.forEach(dt => {
      const ns = sessions[dt];
      const hasT1 = ns.some(n => _T1S.has(n));
      const hasT2 = ns.some(n => _T2S.has(n));
      const t3count = _t3Days[dt] || 0;
      const miss = [];
      if (!hasT1) miss.push('geen T1');
      if (!hasT2) miss.push('geen T2');
      if (t3count < 2) miss.push(`T3: ${t3count}/2`);
      if (!miss.length) good++;
      else issues.push(`${dt.slice(5)}: ${miss.join(', ')}`);
    });
    const rate = Math.round(good / dates.length * 100);
    const clr = rate >= 70 ? 'var(--green)' : rate >= 40 ? 'var(--yellow)' : 'var(--red)';
    adherenceHtml = `<b style="color:${clr}">${good}/${dates.length} sessies (${rate}%)</b> met T1+T2+2×T3.`;
    if (issues.length) adherenceHtml += `<br><span style="font-size:10px">${issues.join(' · ')}</span>`;
    if (absentMuscles.length && rate < 70) adherenceHtml += ` <b style="color:var(--yellow)">Non-adherence brengt balans buiten.</b>`;
  } else if (dates.length) {
    adherenceHtml = `<b>${dates.length} sessies</b> in periode — geen GREYSKULL-fase actief.`;
  }

  // ── Gewicht ──
  const wPts = DATA.weight.filter(p => p.date >= s && p.date <= t);
  const wDelta = wPts.length >= 2 ? Math.round((wPts[wPts.length-1].weight - wPts[0].weight) * 10) / 10 : null;

  // ── Progressie per lift ──
  const progressData = Object.entries(DATA.lifts).filter(([key]) => !BACKGROUND_LIFTS.has(key)).map(([key, lift]) => {
    const pts = lift.points.filter(p => p.date >= s && p.date <= t && p.weight > 0);
    if (pts.length < 2) return null;
    const delta = Math.round((pts[pts.length-1].weight - pts[0].weight) * 10) / 10;
    return { key, delta, first: pts[0].weight, last: pts[pts.length-1].weight };
  }).filter(Boolean);
  const gains = progressData.filter(l => l.delta > 0).sort((a,b) => b.delta - a.delta);
  const nUp = gains.length, nTot = progressData.length;

  // ── FEEDBACK ──
  const parts = [];
  // Beste lift
  if (gains.length) {
    const b = gains[0];
    parts.push(`<b style="color:var(--green)">${b.key}: ${b.first}→${b.last}kg (+${b.delta}kg)</b> — beste progressie.`);
  }
  // Progressie-oordeel
  if (nTot > 0) {
    if (nUp >= Math.ceil(nTot * 0.6))
      parts.push(`${nUp}/${nTot} liften stijgen — <b style="color:var(--green)">progressief schema</b>.`);
    else if (nUp > 0)
      parts.push(`${nUp}/${nTot} liften stijgen — <b style="color:var(--yellow)">gedeeltelijk progressief</b>.`);
    else
      parts.push(`<b style="color:var(--yellow)">Geen gewichtsstijging</b> in deze periode — check progressie of deload.`);
  }
  // Gewicht
  if (wDelta !== null) {
    const wClr = wDelta > 1.5 ? 'var(--red)' : wDelta < -1 ? 'var(--yellow)' : 'var(--green)';
    parts.push(`Gewicht: ${wPts[0].weight}→${wPts[wPts.length-1].weight}kg (<span style="color:${wClr}">${wDelta>=0?'+':''}${wDelta}kg</span>).`);
  }
  // Push/pull advies
  if (ppRatio !== null && ppRatio > 1.4) parts.push(`Voeg horizontale pull toe (Cable Row, Chest Row).`);
  if (absentMuscles.includes('Biceps')) parts.push(`Biceps: 0 sessies — Chin-ups of curls als T3.`);

  // ── Phase label ──
  const phaseNames = overlapping.length
    ? ' <span style="font-family:monospace;color:var(--text);font-size:10px">(' + overlapping.map(p=>p.label).join(' + ') + ')</span>'
    : '';
  const _at = document.getElementById('analysis-title'); if (_at) _at.innerHTML = '&#9658; ANALYSE PERIODE' + phaseNames;
  const adhEl = document.getElementById('adherence-title'); if (adhEl) adhEl.innerHTML = '&#9670; GREYSKULL ADHERENCE' + (gzPhase ? '' : ' <span style="font-size:9px;color:var(--text)">(geen GS fase)</span>');
  const _af = document.getElementById('a-focus'); if (_af) _af.innerHTML = focusHtml;
  const _aa = document.getElementById('a-adherence'); if (_aa) _aa.innerHTML = adherenceHtml;
  const _tp = document.getElementById('a-tips'); if (_tp) _tp.innerHTML = parts.join(' ') || '—';
}

// ── LICHAAMSSAMENSTELLING ─────────────────────────────────────────────────────
// Deurenberg-schatting: BF% = 1.2×BMI + 0.23×leeftijd - 10.8 - 5.4 (man)
// Bert: 193 cm → 3.7249 m², geboren 23/04/1990
const _HEIGHT_M2 = 1.93 * 1.93;
const _AGE = 36;
function estimateBFPct(weightKg) {
  const bmi = weightKg / _HEIGHT_M2;
  return Math.max(5, Math.round((1.2 * bmi + 0.23 * _AGE - 10.8 - 5.4) * 10) / 10);
}

let bodyCompChart = null;
function renderBodyComp(startDate, endDate) {
  const ctx = document.getElementById('bodyCompChart');
  if (!ctx) return;

  // Nearest-neighbour BF% lookup from scale data (sorted by date)
  const _bcSorted = (DATA.body_comp || []).slice().sort((a,b) => a.date < b.date ? -1 : 1);
  function nearestBFPct(dateStr) {
    if (!_bcSorted.length) return null;
    let best = _bcSorted[0], bestDiff = Infinity;
    for (const b of _bcSorted) {
      const diff = Math.abs(new Date(b.date) - new Date(dateStr));
      if (diff < bestDiff) { bestDiff = diff; best = b; }
    }
    // Only use if within 45 days
    return bestDiff <= 45 * 86400000 ? best.bf_pct : null;
  }

  // Filter weight data in period
  const pts = DATA.weight
    .filter(w => { const d = new Date(w.date); return d >= startDate && d <= endDate; })
    .map(w => {
      const exact = (_bcSorted).find(b => b.date === w.date);
      const bfPct = exact ? exact.bf_pct : (nearestBFPct(w.date) ?? estimateBFPct(w.weight));
      const fromScale = !!exact || nearestBFPct(w.date) !== null;
      const fatMass  = Math.round(w.weight * bfPct / 100 * 10) / 10;
      const leanMass = Math.round((w.weight - fatMass) * 10) / 10;
      return { date: w.date, weight: w.weight, bfPct, fatMass, leanMass, estimated: !fromScale };
    });

  if (!pts.length) return;

  const hasActual = pts.some(p => !p.estimated);
  const labels = pts.map(p => {
    const d = new Date(p.date + 'T00:00');
    return d.toLocaleDateString('nl-BE', { day: 'numeric', month: 'short' });
  });
  const fatData  = pts.map(p => p.fatMass);
  const leanData = pts.map(p => p.leanMass);
  const GOAL_LEAN = 71, GOAL_FAT = 15.6;

  // Smart Y axes — strak ingezoomd op de variatie, incl. doelwaarden
  function smartAxis(data, pad=0.3) {
    const mn = Math.min(...data), mx = Math.max(...data);
    const range = mx - mn || 1;
    return { min: Math.floor((mn - range*0.06 - pad) * 10) / 10,
             max: Math.ceil( (mx + range*0.06 + pad) * 10) / 10 };
  }
  const fatAxis  = smartAxis([...fatData, GOAL_FAT]);
  const leanAxis = smartAxis([...leanData, GOAL_LEAN]);

  const isDark = true;
  const gridC = 'rgba(255,255,255,0.05)';
  const textC = '#606080';

  if (bodyCompChart) bodyCompChart.destroy();
  // ── Feedback blok ──────────────────────────────────────────
  const fbEl = document.getElementById('body-comp-feedback');
  if (fbEl && pts.length >= 2) {
    const last  = pts[pts.length - 1];
    const first = pts[0];
    const leanGap = (GOAL_LEAN - last.leanMass);
    const fatGap  = (last.fatMass - GOAL_FAT);
    const leanOk  = leanGap <= 0;
    const fatOk   = fatGap  <= 0;
    // Trend: lean gain/week over geselecteerde periode
    const daysDiff  = (new Date(last.date) - new Date(first.date)) / 86400000;
    const leanDelta = last.leanMass - first.leanMass;
    const weeklyLean = daysDiff >= 7 ? leanDelta / daysDiff * 7 : null;
    // Prognose weken tot doelen
    let etaWeeksLean = null;
    if (weeklyLean && weeklyLean > 0 && !leanOk) etaWeeksLean = Math.round(leanGap / weeklyLean);
    let html = '';
    // Huidige status
    html += `<div><span style="color:var(--muted)">Nu &nbsp;</span>`;
    html += `<span style="color:#80deea;font-weight:700">${last.leanMass} kg lean</span>`;
    html += ` <span style="color:#454560">·</span> `;
    html += `<span style="color:#ff8a65;font-weight:700">${last.fatMass} kg vet</span>`;
    html += ` <span style="color:#454560">·</span> `;
    html += `<span style="color:var(--muted)">BF% ${last.bfPct.toFixed(1)}%${last.estimated ? ' (schatting)' : ''}</span></div>`;
    // Doelgap
    html += `<div><span style="color:var(--muted)">Doel</span>  `;
    html += leanOk
      ? `<span style="color:var(--green)">✓ lean bereikt</span>`
      : `<span style="color:#80deea">+${leanGap.toFixed(1)} kg lean te gaan</span>`;
    html += ` <span style="color:#454560">·</span> `;
    html += fatOk
      ? `<span style="color:var(--green)">✓ vet bereikt</span>`
      : `<span style="color:#ff8a65">−${fatGap.toFixed(1)} kg vet te gaan</span>`;
    html += `</div>`;
    // Trend + prognose
    if (weeklyLean !== null) {
      const sign = weeklyLean > 0 ? '+' : '';
      const _rising  = weeklyLean >  0.05;
      const _falling = weeklyLean < -0.05;
      html += `<div style="margin-top:4px"><span style="color:var(--muted)">Trend</span>  `;
      html += `<span style="color:var(--text)">${sign}${weeklyLean.toFixed(2)} kg lean/week</span>`;
      if (!leanOk) {
        if (_rising && etaWeeksLean) {
          html += ` <span style="color:#454560">·</span> <span style="color:var(--yellow)">doel bereikt in ~${etaWeeksLean} weken</span>`;
        } else if (_falling) {
          html += ` <span style="color:#454560">·</span> <span style="color:var(--red)">lean daalt — check caloriebalans</span>`;
        } else {
          html += ` <span style="color:#454560">·</span> <span style="color:var(--muted)">stabiel — meer eten of meer volume</span>`;
        }
      }
      html += `</div>`;
    }
    // Bronvermelding
    const _hasScale = pts.some(p => !p.estimated);
    const _srcNote = document.getElementById('bc-source-note');
    if (_srcNote) _srcNote.textContent = _hasScale ? 'weegschaal' : 'schatting via Deurenberg';
    html += `<div style="color:#454560;margin-top:2px;font-size:10px;">${_hasScale ? 'BF% van weegschaal (nearest-match) · richting telt, niet het getal.' : 'Geen schaaldata — schatting via Deurenberg · onbetrouwbaar voor recompositie.'}</div>`;
    fbEl.innerHTML = html;
  } else if (fbEl) {
    fbEl.innerHTML = '';
  }

  bodyCompChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Vetmassa (kg)',
          data: fatData,
          borderColor: '#ff8a65',
          backgroundColor: 'rgba(255,138,101,0.08)',
          borderWidth: 2,
          borderDash: hasActual ? [] : [5,3],
          pointRadius: 0,
          pointHoverRadius: 4,
          tension: 0.3,
          yAxisID: 'yFat',
          fill: true,
        },
        {
          label: 'Lean massa (kg)',
          data: leanData,
          borderColor: '#80deea',
          backgroundColor: 'rgba(128,222,234,0.06)',
          borderWidth: 2,
          borderDash: hasActual ? [] : [5,3],
          pointRadius: 0,
          pointHoverRadius: 4,
          tension: 0.3,
          yAxisID: 'yLean',
          fill: true,
        },
        {
          label: 'Doel lean (71 kg)',
          data: labels.map(() => GOAL_LEAN),
          borderColor: 'rgba(128,222,234,0.45)',
          borderWidth: 1.5,
          borderDash: [6, 4],
          pointRadius: 0,
          pointHoverRadius: 0,
          tension: 0,
          yAxisID: 'yLean',
          fill: false,
        },
        {
          label: 'Doel vet (15.6 kg)',
          data: labels.map(() => GOAL_FAT),
          borderColor: 'rgba(255,138,101,0.45)',
          borderWidth: 1.5,
          borderDash: [6, 4],
          pointRadius: 0,
          pointHoverRadius: 0,
          tension: 0,
          yAxisID: 'yFat',
          fill: false,
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          position: 'nearest',
          yAlign: 'bottom',
          callbacks: {
            title: items => items[0].label,
            afterBody: items => {
              const i = items[0].dataIndex;
              const p = pts[i];
              return [`BF% ${p.bfPct.toFixed(1)}%  ·  gewicht ${p.weight} kg${p.estimated ? '  (schatting)' : ''}`];
            }
          }
        }
      },
      scales: {
        x: {
          type: 'category',
          grid: { color: gridC },
          ticks: { color: textC, font: { size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 }
        },
        yFat: {
          type: 'linear', position: 'left',
          min: fatAxis.min, max: fatAxis.max,
          grid: { color: gridC },
          ticks: { color: '#ff8a6599', font: { size: 10 }, callback: v => v + ' kg' },
          title: { display: true, text: 'VET', color: '#ff8a6588', font: { size: 9, family: 'monospace' } }
        },
        yLean: {
          type: 'linear', position: 'right',
          min: leanAxis.min, max: leanAxis.max,
          grid: { drawOnChartArea: false },
          ticks: { color: '#80deea99', font: { size: 10 }, callback: v => v + ' kg' },
          title: { display: true, text: 'LEAN', color: '#80deea88', font: { size: 9, family: 'monospace' } }
        }
      }
    }
  });
}


// Hook body comp into period updates
// ── KPI Goals Panel ────────────────────────────────────────────────────
const KPI_BASELINE_DATE = '2026-06-04';
const KPI_CHECK_DATE    = new Date('2026-07-16');
const KPI_GOALS = [
  { label:'Gewicht',   key:null,        start:86.8, goal:[85,88], unit:'kg', dir:'range' },
  { label:'Vet%',      key:'_bf',       start:20.6, goal:19.5,   unit:'%',  dir:'down'  },
  { label:'Squat',     key:'Squat',     start:95,   goal:100,    unit:'kg', dir:'up'    },
  { label:'Bench',     key:'Bench',     start:82.5, goal:90,     unit:'kg', dir:'up'    },
  { label:'Deadlift',  key:'Deadlift',  start:97.5, goal:115,    unit:'kg', dir:'up'    },
  { label:'Row',       key:'Row',       start:50,   goal:65,     unit:'kg', dir:'up'    },
  { label:'OHP',       key:'OHP',       start:40,   goal:60,     unit:'kg', dir:'up'    },
];

function renderKPI() {
  // Countdown
  const today = new Date();
  const daysLeft = Math.max(0, Math.ceil((KPI_CHECK_DATE - today) / 86400000));
  const cdEl = document.getElementById('kpi-countdown');
  if (cdEl) cdEl.textContent = daysLeft > 0 ? `${daysLeft} dagen` : 'check-in vandaag';

  // Current values
  function getCurrentLift(key) {
    const lift = DATA.lifts[key];
    if (!lift || !lift.points.length) return null;
    return lift.points[lift.points.length - 1].weight;
  }
  function getCurrentWeight() {
    if (!DATA.weight || !DATA.weight.length) return null;
    return DATA.weight[DATA.weight.length - 1].weight;
  }
  function getCurrentBF() {
    const bc = (DATA.body_comp || []);
    if (!bc.length) return null;
    return bc[bc.length - 1].bf_pct;
  }

  const grid = document.getElementById('kpi-grid');
  if (!grid) return;
  grid.innerHTML = KPI_GOALS.map(g => {
    let current;
    if (g.key === null)  current = getCurrentWeight();
    else if (g.key === '_bf') current = getCurrentBF();
    else current = getCurrentLift(g.key);

    if (current === null) return '';

    // Progress bar (only if progress towards goal since baseline)
    let barHtml = '';
    let statusClr = 'var(--muted)';
    let statusTxt = current + ' ' + g.unit;

    if (g.dir === 'up') {
      const progress = Math.min(1, Math.max(0, (current - g.start) / (g.goal - g.start)));
      const hasProgress = current > g.start;
      statusClr = current >= g.goal ? 'var(--green)' : hasProgress ? 'var(--cyan)' : 'var(--muted)';
      if (hasProgress) {
        barHtml = `<div style="height:3px;background:#1a1a2e;border-radius:2px;margin-top:4px;overflow:hidden">
          <div style="height:100%;width:${(progress*100).toFixed(1)}%;background:var(--cyan);border-radius:2px;transition:width .5s"></div>
        </div>`;
      }
    } else if (g.dir === 'down') {
      const progress = Math.min(1, Math.max(0, (g.start - current) / (g.start - g.goal)));
      const hasProgress = current < g.start;
      statusClr = current <= g.goal ? 'var(--green)' : hasProgress ? 'var(--cyan)' : 'var(--muted)';
      if (hasProgress) {
        barHtml = `<div style="height:3px;background:#1a1a2e;border-radius:2px;margin-top:4px;overflow:hidden">
          <div style="height:100%;width:${(progress*100).toFixed(1)}%;background:var(--cyan);border-radius:2px;transition:width .5s"></div>
        </div>`;
      }
    } else if (g.dir === 'range') {
      const inRange = current >= g.goal[0] && current <= g.goal[1];
      statusClr = inRange ? 'var(--green)' : 'var(--yellow)';
    }

    const goalTxt = Array.isArray(g.goal) ? `${g.goal[0]}–${g.goal[1]}` : g.goal;

    return `<div style="display:grid;grid-template-columns:80px 1fr;gap:8px;align-items:start">
      <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;padding-top:1px">${g.label}</div>
      <div>
        <div style="display:flex;justify-content:space-between;font-family:monospace;font-size:11px">
          <span style="color:${statusClr};font-weight:700">${current} ${g.unit}</span>
          <span style="color:#454560">→ ${goalTxt} ${g.unit}</span>
        </div>
        ${barHtml}
      </div>
    </div>`;
  }).join('');
}

renderKPI();
