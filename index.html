<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BITFIT BETA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap');
:root {
  --bg:#08080f; --panel:#0d0d18; --border:#1c1c30;
  --accent:#7b5cff; --cyan:#00e5ff; --green:#00ffb3;
  --red:#ff3d6b; --yellow:#ffd600; --text:#c0c0d8; --muted:#454560;
  --glow-a:0 0 12px #7b5cff88,0 0 30px #7b5cff33;
  --glow-c:0 0 12px #00e5ff88,0 0 30px #00e5ff33;
  --glow-g:0 0 12px #00ffb388,0 0 30px #00ffb333;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Oxanium',sans-serif;font-size:14px;overflow-x:hidden;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 40% at 10% 10%,#7b5cff0a 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 90% 90%,#00e5ff08 0%,transparent 60%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(123,92,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(123,92,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
@keyframes pulse-line{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes popup-in{from{opacity:0;transform:translateY(6px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes neon-a{0%,100%{text-shadow:var(--glow-a)}50%{text-shadow:0 0 4px #7b5cffcc,0 0 30px #7b5cff99}}
header{position:relative;padding:14px 18px 12px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a0a16 0%,transparent 100%);z-index:10;}
header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--cyan),transparent);animation:pulse-line 4s ease-in-out infinite;}
.header-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.logo{font-family:'Oxanium',sans-serif;font-size:clamp(16px,5vw,24px);font-weight:800;letter-spacing:4px;animation:neon-a 5s ease-in-out infinite;}
.logo-bit{color:var(--accent)}.logo-fit{color:var(--cyan)}.logo-beta{color:var(--muted);font-size:.55em;letter-spacing:2px;}
.header-right{display:flex;gap:18px;align-items:center;flex-wrap:wrap;}
.meta-item{display:flex;flex-direction:column;align-items:flex-end;}
.meta-label{font-family:monospace;font-size:8px;letter-spacing:2px;color:var(--muted);}
.meta-value{font-family:monospace;font-size:11px;font-weight:700;}
.tabs{display:flex;padding:10px 18px 0;gap:5px;overflow-x:auto;scrollbar-width:none;position:relative;z-index:10;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:6px 14px;font-family:monospace;font-size:10px;letter-spacing:1.5px;cursor:pointer;border:1px solid var(--muted);background:transparent;color:var(--muted);clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);transition:all .2s;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent;user-select:none;}
.tab:hover{color:var(--cyan);border-color:var(--cyan);}
.tab.active{color:var(--accent);border-color:var(--accent);background:#7b5cff11;box-shadow:0 0 12px #7b5cff22;}
#period-badge{font-family:monospace;font-size:9px;color:var(--muted);padding:4px 0 10px 18px;position:relative;z-index:10;}
#period-badge span{color:var(--cyan);}
.main{padding:0 12px 24px;display:flex;flex-direction:column;gap:12px;position:relative;z-index:1;}
.panel{background:var(--panel);border:1px solid var(--border);padding:14px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent 60%);box-shadow:0 0 8px var(--accent);}
.panel.c::before{background:linear-gradient(90deg,var(--cyan),transparent 60%);box-shadow:0 0 8px var(--cyan);}
.panel.g::before{background:linear-gradient(90deg,var(--green),transparent 60%);box-shadow:0 0 8px var(--green);}
.panel.y::before{background:linear-gradient(90deg,var(--yellow),transparent 60%);box-shadow:0 0 8px var(--yellow);}
.panel.r::before{background:linear-gradient(90deg,var(--red),transparent 60%);box-shadow:0 0 8px var(--red);}
.panel-title{font-family:monospace;font-size:9px;letter-spacing:2.5px;color:var(--accent);margin-bottom:12px;text-transform:uppercase;}
.panel.c .panel-title{color:var(--cyan);}.panel.g .panel-title{color:var(--green);}
.panel.y .panel-title{color:var(--yellow);}.panel.r .panel-title{color:var(--red);}
.lift-toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.lift-mode-btn{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;padding:4px 12px;border:1px solid var(--accent);background:transparent;color:var(--muted);cursor:pointer;clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);transition:all .2s;-webkit-tap-highlight-color:transparent;}
.lift-mode-btn.active{color:var(--accent);background:#7b5cff15;box-shadow:0 0 8px #7b5cff22;}
.lift-filters{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.lift-btn{font-family:monospace;font-size:9px;letter-spacing:1px;padding:3px 9px;border:1px solid;background:transparent;cursor:pointer;clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);transition:all .15s;opacity:.35;-webkit-tap-highlight-color:transparent;user-select:none;}
.lift-btn.active{opacity:1;}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.stat-card{background:#0a0a15;border:1px solid var(--border);padding:10px 12px;}
.stat-label{font-family:monospace;font-size:8px;letter-spacing:1px;color:var(--muted);margin-bottom:4px;}
.stat-value{font-size:clamp(18px,5vw,24px);font-weight:700;line-height:1;color:var(--accent);text-shadow:var(--glow-a);}
.stat-value.c{color:var(--cyan);text-shadow:var(--glow-c);}
.stat-value.g{color:var(--green);text-shadow:var(--glow-g);}
.stat-value.r{color:var(--red);}
.stat-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.pr-section-label{font-family:monospace;font-size:8px;letter-spacing:2px;color:var(--muted);margin-bottom:6px;}
.pr-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;}
.pr-row:last-child{border-bottom:none;}
.pr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.pr-lift{flex:1;}.pr-vals{font-family:monospace;font-size:10px;color:var(--muted);}
.pr-gain{color:var(--green);font-family:monospace;font-size:11px;margin-left:4px;}
.analysis-blocks{display:flex;flex-direction:column;gap:14px;}
.analysis-block{}
.analysis-title{font-family:monospace;font-size:8px;letter-spacing:2px;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.analysis-title.a{color:var(--accent);}.analysis-title.c{color:var(--cyan);}
.analysis-title.g{color:var(--green);}.analysis-title.y{color:var(--yellow);}.analysis-title.r{color:var(--red);}
.analysis-text{font-size:13px;color:var(--text);line-height:1.65;}
.analysis-text b{color:var(--yellow);}.analysis-text em{color:var(--cyan);font-style:normal;}
.new-ex-list{}.new-ex-item{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;}
.new-ex-item:last-child{border-bottom:none;}
.new-ex-date{font-family:monospace;font-size:9px;color:var(--muted);white-space:nowrap;margin-left:8px;}
.cd{position:absolute;width:10px;height:10px;border-color:var(--accent);border-style:solid;opacity:.3;}
.cd.tl{top:4px;left:4px;border-width:1px 0 0 1px;}.cd.tr{top:4px;right:4px;border-width:1px 1px 0 0;}
.cd.bl{bottom:4px;left:4px;border-width:0 0 1px 1px;}.cd.br{bottom:4px;right:4px;border-width:0 1px 1px 0;}
.phase-popup{position:fixed;z-index:10000;background:#090912;border:1px solid var(--border);padding:12px 14px;max-width:260px;font-size:12px;line-height:1.6;color:var(--text);box-shadow:0 0 30px rgba(0,0,0,.9);animation:popup-in .15s ease;pointer-events:none;}
.phase-popup-title{font-family:monospace;font-size:10px;letter-spacing:2px;margin-bottom:7px;}
@media(min-width:768px){
  header{padding:16px 24px 14px;}
  .tabs{padding:14px 24px 0;}
  #period-badge{padding:4px 0 12px 24px;}
  .main{padding:0 24px 28px;display:grid;grid-template-columns:1fr 300px;gap:14px;}
  .lift-panel{grid-row:1;}.right-col{grid-row:1;display:flex;flex-direction:column;gap:12px;}
  .analysis-panel{grid-column:1 / -1;}
  .analysis-blocks{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
  .panel{padding:16px 18px;}
}
</style>
</head>

<header>
  <div class="header-inner">
    <div class="logo"><span class="logo-bit">BIT</span><span class="logo-fit">FIT</span> <span class="logo-beta">BETA</span></div>
    <div class="header-right">
      <div class="meta-item">
        <span class="meta-label">SUBJECT</span>
        <span class="meta-value" style="color:var(--cyan)">BERT // 193CM // <span id="hdr-weight">84.6</span>KG</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">EXPORT</span>
        <span class="meta-value" style="color:var(--muted)">2026-03-16</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">STATUS</span>
        <span class="meta-value" style="color:var(--green)">LIVE</span>
      </div>
    </div>
  </div>
</header>

<div class="tabs">
  <div class="tab" data-period="10">10D</div>
  <div class="tab active" data-period="30">30D</div>
  <div class="tab" data-period="90">90D</div>
  <div class="tab" data-period="0">YTD</div>
</div>
<div id="period-badge">PERIODE: <span id="badge-text">—</span></div>

<div class="main">

  <div class="panel lift-panel">
    <div class="cd tl"></div><div class="cd tr"></div><div class="cd bl"></div><div class="cd br"></div>
    <div class="panel-title">&#9658; LIFTS &mdash; <span id="panel-lift-title">WERKGEWICHT</span></div>
    <div class="lift-toggle-row">
      <div style="display:flex;gap:5px;">
        <button class="lift-mode-btn active" id="btn-werk" onclick="setLiftMode('werk')">WERKGEWICHT</button>
        <button class="lift-mode-btn" id="btn-1rm" onclick="setLiftMode('1rm')">EST. 1RM</button>
      </div>
    </div>
    <div class="lift-filters" id="lift-filters"></div>
    <div style="position:relative;height:clamp(220px,55vw,320px);">
      <canvas id="liftChart" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
    </div>
  </div>

  <div class="right-col">
    <div class="panel y">
      <div class="cd tl" style="border-color:var(--yellow)"></div>
      <div class="cd tr" style="border-color:var(--yellow)"></div>
      <div class="panel-title">&#9658; PERIODE STATS</div>
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">GYM / PERIODE</div>
          <div style="display:flex;align-items:baseline;gap:3px;">
            <span class="stat-value" id="s-gymdays">—</span>
            <span style="font-family:monospace;color:var(--muted);font-size:11px" id="s-totaldays"></span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-label">GEWICHT &Delta;</div>
          <div class="stat-value g" id="s-wdelta">—</div>
          <div class="stat-sub" id="s-wrange">—</div>
        </div>
      </div>
      <div class="pr-section-label">&#9658; TOP 3 GESCHATTE 1RM</div>
      <div id="pr-top3"></div>
    </div>
  </div>

  <div class="panel g analysis-panel">
    <div class="cd tl" style="border-color:var(--green)"></div>
    <div class="cd tr" style="border-color:var(--green)"></div>
    <div class="panel-title" id="analysis-title">&#9658; ANALYSE PERIODE</div>
    <div class="analysis-blocks">
      <div class="analysis-block">
        <div class="analysis-title a">&#9670; SPIERGROEP BALANS</div>
        <div class="analysis-text" id="a-focus">—</div>
      </div>
      <div class="analysis-block">
        <div class="analysis-title g" id="evolution-title">&#9670; TRAINING EVOLUTIE</div>
        <div class="analysis-text" id="a-evolution">—</div>
        <div style="margin-top:10px" id="new-ex-container"></div>
      </div>
      <div class="analysis-block">
        <div class="analysis-title r">&#9670; FEEDBACK</div>
        <div class="analysis-text" id="a-tips">—</div>
      </div>
    </div>
  </div>

</div>

function inPeriod(dateStr, start) {
  const s = start.toISOString().slice(0,10);
  const t = TODAY.toISOString().slice(0,10);
  return dateStr >= s && dateStr <= t;
}
function fmt(d) { return d.toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'}); }
function getPeriodStart(days) {
  if (days === 0) return new Date('2026-01-01');
  const d = new Date(TODAY); d.setDate(d.getDate() - days); return d;
}

const phaseBandsPlugin = {
  id: 'phaseBands',
  afterDraw(chart) {
    const {ctx, chartArea:{left,right,top,bottom}} = chart;
    const opts = chart.options.plugins.phaseBands;
    if (!opts || !opts.phases || !opts.labels.length) return;
    const labels = opts.labels, total = labels.length;
    if (total < 2) return;
    const slotW = (right - left) / total;
    _phaseBandHitAreas = [];
    opts.phases.forEach(phase => {
      const fi = labels.findIndex(d => d >= phase.start);
      const lr = [...labels].reverse().findIndex(d => d <= phase.end);
      const li = lr === -1 ? -1 : total - 1 - lr;
      if (fi === -1 || li === -1 || fi > li) return;
      const x1 = left + fi * slotW, x2 = left + (li+1) * slotW;
      const bandH = 18, y = bottom + 2, bw = x2 - x1;
      ctx.save();
      ctx.fillStyle = phase.color + '25'; ctx.fillRect(x1, y, bw, bandH);
      ctx.strokeStyle = phase.color + 'aa'; ctx.lineWidth = 1;
      ctx.shadowColor = phase.color; ctx.shadowBlur = 3;
      ctx.beginPath(); ctx.moveTo(x1,y); ctx.lineTo(x2,y); ctx.stroke(); ctx.shadowBlur = 0;
      const lbl = bw < 50 ? phase.short : phase.label;
      ctx.fillStyle = phase.color; ctx.shadowColor = phase.color; ctx.shadowBlur = 5;
      ctx.font = "700 8px 'Space Mono', monospace";
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(lbl, x1 + bw/2, y + bandH/2); ctx.shadowBlur = 0;
      ctx.strokeStyle = phase.color + '33'; ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(x1,top); ctx.lineTo(x1,bottom); ctx.stroke();
      ctx.setLineDash([]); ctx.restore();
      _phaseBandHitAreas.push({phase, x1, x2, y, bandH});
    });
  }
};
Chart.register(phaseBandsPlugin);

function showPhasePopup(phase, cx, cy) {
  hidePhasePopup();
  const el = document.createElement('div');
  el.className = 'phase-popup';
  el.style.borderColor = phase.color + '66';
  el.innerHTML = '<div class="phase-popup-title" style="color:' + phase.color + '">' + phase.label + '</div>' + phase.desc;
  let left = cx + 12, top = cy - 20;
  if (left + 260 > window.innerWidth - 8) left = cx - 272;
  if (top + 140 > window.innerHeight - 8) top = window.innerHeight - 148;
  el.style.left = left + 'px'; el.style.top = top + 'px';
  document.body.appendChild(el); _activePopup = el;
}
function hidePhasePopup() { if (_activePopup) { _activePopup.remove(); _activePopup = null; } }
document.addEventListener('click', e => { if (_activePopup && !_activePopup.contains(e.target)) hidePhasePopup(); });

function buildLiftDatasets(start) {
  const s = start.toISOString().slice(0,10), t = TODAY.toISOString().slice(0,10);
  const allDatesSet = new Set();
  Object.values(DATA.lifts).forEach(lift => lift.points.filter(p => p.date >= s && p.date <= t).forEach(p => allDatesSet.add(p.date)));
  DATA.weight.filter(p => p.date >= s && p.date <= t).forEach(p => allDatesSet.add(p.date));
  const allDates = Array.from(allDatesSet).sort();
  const datasets = Object.entries(DATA.lifts).map(([key, lift]) => {
    const byDate = {};
    lift.points.filter(p => p.date >= s && p.date <= t).forEach(p => byDate[p.date] = p);
    return {
      label: key, data: allDates.map(d => {
        if (!byDate[d]) return null;
        return liftMode === '1rm' ? (byDate[d].est1rm || Math.round(byDate[d].weight * epleyFactor * 10) / 10) : byDate[d].weight;
      }),
      borderColor: lift.color, backgroundColor: lift.color + '22',
      pointBackgroundColor: allDates.map(d => byDate[d] ? lift.color : 'transparent'),
      pointBorderColor: allDates.map(d => byDate[d]&&byDate[d].pr ? '#ffffff88' : 'transparent'),
      pointBorderWidth: 1,
      pointRadius: allDates.map(d => byDate[d] ? 3 : 0),
      pointHoverRadius: 5, borderWidth: 2, tension: 0.3, spanGaps: true, fill: false,
    };
  });
  const wByDate = {};
  DATA.weight.filter(p => p.date >= s && p.date <= t).forEach(p => wByDate[p.date] = p.weight);
  datasets.push({
    label: 'Gewicht', data: allDates.map(d => wByDate[d] ?? null),
    borderColor: 'rgba(255,255,255,0.35)', backgroundColor: 'transparent',
    pointBackgroundColor: 'rgba(255,255,255,0.35)', pointBorderColor: 'transparent',
    pointStyle: 'circle', pointRadius: allDates.map(d => wByDate[d]!==undefined ? 2 : 0),
    pointHoverRadius: 4, borderWidth: 1, tension: 0.5, spanGaps: true, fill: false, borderDash: [4,4],
  });
  return {datasets, labels: allDates};
}

function computeStats(start) {
  const s = start.toISOString().slice(0,10), t = TODAY.toISOString().slice(0,10);
  const totalDays = Math.round((TODAY - start) / 86400000) + 1;
  const td = (DATA.all_active_days || DATA.training_days).filter(d => d >= s && d <= t).length;
  const wPts = DATA.weight.filter(p => p.date >= s && p.date <= t);
  const wFirst = wPts.length ? wPts[0].weight : null;
  const wLast  = wPts.length ? wPts[wPts.length-1].weight : null;
  // Smart delta: 3-day average now vs 3-day average 10 days ago
  const allW = DATA.weight.slice().sort((a,b) => a.date.localeCompare(b.date));
  const recentW = allW.slice(-3).map(w => w.weight);
  const recentAvg = recentW.length ? Math.round(recentW.reduce((a,b) => a+b,0) / recentW.length * 100) / 100 : null;
  const oldCenter = new Date(TODAY); oldCenter.setDate(oldCenter.getDate() - 10);
  const oldCenterStr = oldCenter.toISOString().slice(0,10);
  const oldW = allW.filter(w => w.date >= subtractDays(oldCenterStr, 2) && w.date <= addDays(oldCenterStr, 2));
  const oldAvg = oldW.length
    ? Math.round(oldW.reduce((a,b) => a + b.weight, 0) / oldW.length * 100) / 100
    : (allW.length ? allW.reduce((a,b) => Math.abs(new Date(a.date)-oldCenter) < Math.abs(new Date(b.date)-oldCenter) ? a : b).weight : null);
  const wDelta = recentAvg && oldAvg ? Math.round((recentAvg - oldAvg) * 100) / 100 : null;
  const wDeltaLabel = wDelta !== null ? (wDelta >= 0 ? '+' : '') + wDelta + ' (3d gem)' : null;

  function subtractDays(dateStr, n) { const d = new Date(dateStr); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); }
  function addDays(dateStr, n) { const d = new Date(dateStr); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
  const epley = w => Math.round(w * 1.1 * 10) / 10;
  const prs = {};
  Object.entries(DATA.lifts).forEach(([key, lift]) => {
    const all = lift.points.filter(p => p.date >= s && p.date <= t);
    const prPts = all.filter(p => p.pr);
    if (!prPts.length) return;
    const firstW = all[0]?.weight ?? prPts[0].weight;
    const maxW = Math.max(...prPts.map(p => p.weight));
    prs[key] = {weight: maxW, est1rm: epley(maxW), firstWeight: firstW, rm_gain: Math.round((epley(maxW)-epley(firstW))*10)/10, color: lift.color};
  });
  const top3 = Object.entries(prs).sort((a,b) => b[1].rm_gain - a[1].rm_gain).slice(0,3);
  return {td, totalDays, wFirst, wLast, wDelta, wDeltaLabel, top3};
}

function renderStats(stats) {
  const $ = id => document.getElementById(id);
  $('s-gymdays').textContent = stats.td;
  $('s-totaldays').textContent = '/ ' + stats.totalDays + 'd';
  if (stats.wDelta !== null) {
    $('s-wdelta').textContent = (stats.wDelta >= 0 ? '+' : '') + stats.wDelta + ' kg';
    $('s-wdelta').className = 'stat-value ' + (stats.wDelta <= 0 ? 'g' : 'r');
    $('s-wrange').textContent = stats.wDeltaLabel || (stats.wFirst + ' -> ' + stats.wLast + ' kg');
  }
  const top3El = $('pr-top3');
  top3El.innerHTML = '';
  if (!stats.top3.length) {
    top3El.innerHTML = '<div style="color:var(--muted);font-size:11px;padding:4px 0">Geen PRs in deze periode</div>';
  } else {
    stats.top3.forEach(([key, info]) => {
      top3El.innerHTML += '<div class="pr-row"><div class="pr-dot" style="background:' + info.color + ';box-shadow:0 0 5px ' + info.color + '"></div><div class="pr-lift">' + key + '</div><div class="pr-vals">~' + info.est1rm + 'kg 1RM</div><div class="pr-gain">+' + info.rm_gain + 'kg</div></div>';
    });
  }
}

function renderNewEx(start) {
  const s = start.toISOString().slice(0,10), t = TODAY.toISOString().slice(0,10);
  const filtered = DATA.new_exercises.filter(e => e.date >= s && e.date <= t);
  const container = document.getElementById('new-ex-container');
  if (!filtered.length) { container.innerHTML = ''; return; }
  const show = filtered.slice(0,5);
  const extra = filtered.length > 5 ? '<div style="color:var(--muted);font-size:10px;padding:3px 0">+ ' + (filtered.length-5) + ' meer</div>' : '';
  container.innerHTML = '<div style="font-size:8px;color:var(--red);letter-spacing:2px;margin-bottom:5px;">NIEUW IN PERIODE</div>' +
    show.map(e => '<div class="new-ex-item"><span>' + e.exercise + '</span><span class="new-ex-date">' + e.date.slice(5).replace('-','/') + '</span></div>').join('') + extra;
}

function renderAnalysis(start) {
  const s = start.toISOString().slice(0,10), t = TODAY.toISOString().slice(0,10);
  const overlapping = PHASES.filter(p => p.start <= t && p.end >= s);
  let a;
  if (overlapping.length === 1) { a = PHASE_ANALYSIS[overlapping[0].label] || PHASE_ANALYSIS['multi']; }
  else if (!overlapping.length) { a = PHASE_ANALYSIS['multi']; }
  else if (overlapping.length >= 3) { a = PHASE_ANALYSIS['multi']; }
  else {
    let best = overlapping[0], bestDays = 0;
    overlapping.forEach(p => {
      const ps = new Date(Math.max(new Date(p.start), start));
      const pe = new Date(Math.min(new Date(p.end), TODAY));
      const days = (pe - ps) / 86400000;
      if (days > bestDays) { bestDays = days; best = p; }
    });
    a = PHASE_ANALYSIS[best.label] || PHASE_ANALYSIS['multi'];
  }
  const phaseNames = overlapping.length
    ? ' <span style="font-family:monospace;color:var(--muted);font-size:8px">(' + overlapping.map(p => p.label).join(' + ') + ')</span>'
    : '';
  document.getElementById('analysis-title').innerHTML = '&#9658; ANALYSE PERIODE' + phaseNames;
  const evoEl = document.getElementById('evolution-title');
  if (evoEl) evoEl.innerHTML = '&#9670; TRAINING EVOLUTIE' + phaseNames;
  document.getElementById('a-focus').innerHTML = a.focus;
  document.getElementById('a-evolution').innerHTML = a.evolution;
  document.getElementById('a-tips').innerHTML = a.tips || '-';
}

function update(periodDays) {
  const start = getPeriodStart(periodDays);
  document.getElementById('badge-text').textContent = fmt(start) + ' - ' + fmt(TODAY);
  const {datasets: liftDs, labels: liftLabels} = buildLiftDatasets(start);
  const stats = computeStats(start);
  const mobile = window.innerWidth < 768;
  if (liftChart) liftChart.destroy();
  const ctx = document.getElementById('liftChart').getContext('2d');
  liftChart = new Chart(ctx, {
    type: 'line',
    data: {labels: liftLabels, datasets: liftDs},
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: {mode:'index',intersect:false},
      layout: {padding:{bottom:22}},
      scales: {
        x: {type:'category',grid:{color:'#1a1a2e'},ticks:{maxRotation:mobile?45:35,color:'#454560',autoSkip:true,maxTicksLimit:mobile?6:12,font:{size:mobile?8:9},callback:function(val,i){const v=this.getLabelForValue(val);return v?v.slice(5):'';}}},
        y: {grid:{color:'#1a1a2e'},ticks:{color:'#7b5cff99',font:{size:mobile?8:9},callback:v=>v+'kg'}}
      },
      plugins: {
        legend: {display:false},
        tooltip: {backgroundColor:'#0a0a15',borderColor:'#1c1c30',borderWidth:1,titleColor:'#7b5cff',bodyColor:'#c0c0d8',callbacks:{label:ctx=>' '+ctx.dataset.label+': '+ctx.parsed.y+'kg'}},
        phaseBands: {phases:PHASES, labels:liftLabels}
      }
    }
  });
  const canvas = document.getElementById('liftChart');
  canvas.style.cursor = 'default';
  canvas.onclick = e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX-rect.left, my = e.clientY-rect.top;
    let hit = false;
    for (const a of _phaseBandHitAreas) {
      if (mx>=a.x1&&mx<=a.x2&&my>=a.y&&my<=a.y+a.bandH) { showPhasePopup(a.phase,e.clientX,e.clientY); hit=true; break; }
    }
    if (!hit) hidePhasePopup();
  };
  canvas.onmousemove = e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX-rect.left, my = e.clientY-rect.top;
    canvas.style.cursor = _phaseBandHitAreas.some(a=>mx>=a.x1&&mx<=a.x2&&my>=a.y&&my<=a.y+a.bandH)?'pointer':'default';
  };
  const filtersEl = document.getElementById('lift-filters');
  filtersEl.innerHTML = '';
  liftDs.forEach((ds, i) => {
    if (ds.label === 'Gewicht') return;
    const hasData = ds.data.some(v => v !== null);
    const btn = document.createElement('button');
    const active = hasData;
    btn.className = 'lift-btn' + (active ? ' active' : '');
    btn.textContent = ds.label;
    btn.style.color = ds.borderColor;
    btn.style.borderColor = ds.borderColor;
    btn.style.backgroundColor = active ? ds.borderColor + '15' : 'transparent';
    btn.addEventListener('click', () => {
      const meta = liftChart.getDatasetMeta(i);
      const hidden = meta.hidden === true;
      meta.hidden = !hidden;
      btn.classList.toggle('active', hidden);
      btn.style.backgroundColor = hidden ? ds.borderColor + '15' : 'transparent';
      liftChart.update();
    });
    filtersEl.appendChild(btn);
  });
  liftChart.update();
  renderStats(stats);
  renderNewEx(start);
  renderAnalysis(start);
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    update(parseInt(tab.dataset.period));
  });
});
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { update(parseInt(document.querySelector('.tab.active').dataset.period)); }, 200);
});
update(30);
</script>
